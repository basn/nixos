# Starter config for local nested testing
# Reference: /nix/store/zp79himp70kxsg043kq37njz98cjbjwh-mangowc-0.12.3/etc/mango/config.conf

# Window effect
blur=0
blur_layer=0
blur_optimized=1
shadows=0
layer_shadows=0
border_radius=0
no_radius_when_single=1
focused_opacity=1.0
unfocused_opacity=1.0

# Animation
animations=0
layer_animations=0
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
animation_duration_move=260
animation_duration_open=220
animation_duration_tag=200
animation_duration_close=260

# Layout defaults
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0
no_border_when_single=1
allow_tearing=1

# Scroller layout
scroller_structs=20
scroller_default_proportion=0.90
scroller_default_proportion_single=1.00
scroller_focus_center=0
scroller_prefer_center=0

# Overview
overviewgappi=5
overviewgappo=30

# Misc
sloppyfocus=1
warpcursor=0
focus_on_activate=0
cursor_size=24

# Appearance
gappih=0
gappiv=0
gappoh=0
gappov=0
borderpx=3
rootcolor=0x1b1f2aff
bordercolor=0x3a4256ff
focuscolor=0x7aa2f7ff
urgentcolor=0xf7768eff

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=se
xkb_rules_variant=nodeadkeys

# Mouse / pointer
accel_profile=0
accel_speed=0.0

# Default layout per tag
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# Key bindings
bind=SUPER,r,reload_config
bind=SUPER,Return,spawn,ghostty
bind=SUPER,m,quit
bind=SUPER,q,killclient,

bind=SUPER,Tab,focusstack,next
bind=ALT,Left,focusdir,left
bind=ALT,Right,focusdir,right
bind=ALT,Up,focusdir,up
bind=ALT,Down,focusdir,down
bind=CTRL+ALT,Page_Up,viewtoleft,0
bind=CTRL+ALT,Page_Down,viewtoright,0
bind=ALT,Tab,toggleoverview,

bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

bind=SUPER,space,spawn,/run/current-system/sw/bin/noctalia-shell ipc call launcher toggle
bind=SUPER,n,switch_layout
bind=SUPER,f,togglefullscreen,
bind=SUPER+SHIFT,f,togglefloating,
bind=SUPER,a,togglemaximizescreen,
bind=SUPER,z,toggle_scratchpad
bind=SUPER,o,toggleoverlay,
bind=SUPER,l,spawn,/run/current-system/sw/bin/noctalia-shell ipc call lockScreen lock

# Media keys (Keychron)
# Screenshot keys
bind=NONE,Print,spawn,/home/basn/.config/mangowc/scripts/screenshot-full.sh
bind=NONE,Sys_Req,spawn,/home/basn/.config/mangowc/scripts/screenshot-full.sh
bind=SHIFT,Print,spawn,/home/basn/.config/mangowc/scripts/screenshot-region.sh
bind=SHIFT,Sys_Req,spawn,/home/basn/.config/mangowc/scripts/screenshot-region.sh
bind=ALT,Print,spawn,/home/basn/.config/mangowc/scripts/screenshot-copy-region.sh
bind=ALT,Sys_Req,spawn,/home/basn/.config/mangowc/scripts/screenshot-copy-region.sh

bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=NONE,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind=NONE,XF86AudioPlay,spawn,/run/current-system/sw/bin/playerctl play-pause
bind=NONE,XF86AudioPause,spawn,/run/current-system/sw/bin/playerctl pause
bind=NONE,XF86AudioNext,spawn,/run/current-system/sw/bin/playerctl next
bind=NONE,XF86AudioPrev,spawn,/run/current-system/sw/bin/playerctl previous
bind=NONE,XF86AudioStop,spawn,/run/current-system/sw/bin/playerctl stop

bind=SUPER,Left,viewtoleft,0
bind=SUPER,Right,viewtoright,0
bind=CTRL+SUPER,Left,tagtoleft,0
bind=CTRL+SUPER,Right,tagtoright,0

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# Gaps
bind=SUPER+SHIFT,minus,incgaps,-1
bind=SUPER+SHIFT,equal,incgaps,1
bind=SUPER+SHIFT,g,togglegaps

# Mouse bindings
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
xwayland_persistence=1
allow_shortcuts_inhibit=0
